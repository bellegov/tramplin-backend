version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: tramplin_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tramplin
    ports:
      - "5433:5432"
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: tramplin_adminer
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      - postgres

  backend:
    build: 
      context: ./backend  # Указываем Докеру, где искать Dockerfile
    container_name: tramplin_backend
    ports:
      - "8080:8080"
    environment:
      # Важнейший момент: переопределяем URL для Докера. 
      # Внутри докер-сети база откликается по имени сервиса 'postgres' и стандартному порту 5432
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tramplin
    depends_on:
      - postgres
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: tramplin_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: rootpassword
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: tramplin_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 root rootpassword;
      mc mb myminio/tramplin-images || true;
      mc anonymous set download myminio/tramplin-images;
      exit 0;
      "